
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KEDU Space Mission</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background-color: #020617;
            overflow: hidden;
        }
        .font-nasa {
            font-family: 'Orbitron', sans-serif;
        }
        @keyframes slideUp {
          0% { transform: translateY(150%) scale(1.2); opacity: 0; }
          10% { opacity: 1; }
          90% { opacity: 1; }
          100% { transform: translateY(-200vh) scale(0.5); opacity: 0; }
        }
        .animate-rocket-launch {
            animation: slideUp 4s ease-in-out forwards;
        }
        .animate-rocket-repeat {
            animation: slideUp 10s linear infinite;
        }
        @keyframes redFlash {
          0%, 100% { background-color: transparent; }
          50% { background-color: rgba(239, 68, 68, 0.2); }
        }
        .animate-red-flash {
            animation: redFlash 1s infinite;
        }
        @keyframes fall {
          0% { transform: translateY(-10vh) translateX(0) rotate(0deg); opacity: 0; }
          10% { opacity: 1; }
          90% { opacity: 1; }
          100% { transform: translateY(110vh) translateX(20px) rotate(360deg); opacity: 0; }
        }
        .animate-fall {
            animation: fall 3s linear infinite;
        }
    </style>
